name: Generate Snake Animation

on:
  schedule:
    # Runs every 12 hours to keep the contribution snake fresh
    - cron: "0 */12 * * *"
  workflow_dispatch: # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs (dark + light)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#BD00FF&color_dots=#161b22,#00f0ff,#bd00ff,#ff003c,#ffffff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
